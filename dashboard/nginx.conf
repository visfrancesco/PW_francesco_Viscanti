resolver 127.0.0.11 valid=10s;

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/influxdb/ {
        proxy_pass http://influxdb:8086/;
        proxy_set_header Host $host;
    }

    location /api/sim/ {
        set $sim_upstream http://simulatori:9000;
        rewrite ^/api/sim/(.*) /$1 break;
        proxy_pass $sim_upstream;
        proxy_set_header Host $host;
    }
}
