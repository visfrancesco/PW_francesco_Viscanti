services:
  emqx:
    image: emqx/emqx:5.8.6
    container_name: emqx
    ports:
      - "1883:1883"       # MQTT
      - "8083:8083"       # MQTT over WebSocket
      - "8883:8883"       # MQTT over TLS
      - "18083:18083"     # EMQX Dashboard
    volumes:
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf
      - ./emqx/acl.conf:/opt/emqx/etc/acl.conf
      - ./emqx/api_keys.bootstrap:/opt/emqx/data/.bootstrap_api_keys
      - ./certs:/opt/emqx/etc/certs:ro
      - emqx-data:/opt/emqx/data
    environment:
      EMQX_NAME: tenuta_ferrante
      EMQX_HOST: 0.0.0.0
      EMQX_API_KEY__BOOTSTRAP_FILE: '"/opt/emqx/data/.bootstrap_api_keys"'
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agritech

  influxdb:
    image: influxdb:2.7
    container_name: agri-influxdb
    ports:
      - "8087:8086"   # 8086 già occupato dall'istanza influxdb del host
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: tenuta-ferrante
      DOCKER_INFLUXDB_INIT_BUCKET: sensori
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token-tenuta-ferrante
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agritech

  init-rules:
    image: curlimages/curl:latest
    container_name: init-rules
    depends_on:
      emqx:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    volumes:
      - ./emqx/init-rules.sh:/init-rules.sh
    entrypoint: ["/bin/sh", "/init-rules.sh"]
    networks:
      - agritech

  simulatori:
    build:
      context: ../simulatori
      dockerfile: Dockerfile
    container_name: simulatori
    depends_on:
      emqx:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      MQTT_HOST: emqx
      INFLUXDB_URL: http://influxdb:8086
    networks:
      - agritech

  dashboard:
    image: nginx:alpine
    container_name: dashboard
    ports:
      - "8080:80"
    volumes:
      - ../dashboard:/usr/share/nginx/html:ro
      - ../dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - agritech

volumes:
  emqx-data:
  influxdb-data:

networks:
  agritech:
    driver: bridge
