%% ACL Rules — Tenuta Ferrante
%% Ref: docs/requisiti.md RNF-05, topologia topic sez. 7.1
%%
%% EMQX authorization.no_match = deny — tutto cio che non e
%% esplicitamente permesso viene rifiutato.

%% ── Sensori meteo: pubblicano solo sui propri topic ──────────────────

{allow, {username, "sensore"}, publish, [
  "tenuta/parcella/+/microclima/#"
]}.

{allow, {username, "sensore"}, subscribe, [
  "tenuta/sistema/config"
]}.

%% ── Sensori suolo: pubblicano solo sui propri topic ──────────────────

{allow, {username, "suolo"}, publish, [
  "tenuta/parcella/+/suolo/#"
]}.

{allow, {username, "suolo"}, subscribe, [
  "tenuta/sistema/config"
]}.

%% ── Elettrovalvole: subscribe comandi, publish ack e stato ───────────

{allow, {username, "valvola"}, subscribe, [
  "tenuta/parcella/+/irrigazione/cmd"
]}.

{allow, {username, "valvola"}, publish, [
  "tenuta/parcella/+/irrigazione/ack",
  "tenuta/parcella/+/irrigazione/stato"
]}.

%% ── Bridge InfluxDB: subscribe a tutto per persistenza ───────────────

{allow, {username, "bridge"}, subscribe, [
  "tenuta/#"
]}.

%% ── Dashboard: lettura completa, comandi irrigazione ─────────────────

{allow, {username, "dashboard"}, subscribe, [
  "tenuta/#"
]}.

{allow, {username, "dashboard"}, publish, [
  "tenuta/parcella/+/irrigazione/cmd"
]}.
