## EMQX Configuration — Tenuta Ferrante Prototype
## Ref: docs/requisiti.md sez. 7, RI-01, RI-03, RNF-05

node {
  name = "tenuta_ferrante@127.0.0.1"
  cookie = "tenuta_ferrante_secret"
  data_dir = "data"
}

## ── Listeners ────────────────────────────────────────────────────────

## MQTT TCP — porta 1883 (dispositivi interni / dev)
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024000
}

## MQTT over TLS — porta 8883 (dispositivi in produzione, RNF-05)
listeners.ssl.default {
  bind = "0.0.0.0:8883"
  max_connections = 1024000
  ssl_options {
    certfile = "/opt/emqx/etc/certs/server.crt"
    keyfile  = "/opt/emqx/etc/certs/server.key"
    cacertfile = "/opt/emqx/etc/certs/ca.crt"
    verify = verify_none
  }
}

## MQTT over WebSocket — porta 8083 (dashboard)
listeners.ws.default {
  bind = "0.0.0.0:8083"
  websocket.mqtt_path = "/mqtt"
  max_connections = 512
}

## WSS default disabilitato (non servono WebSocket sicuri nel prototipo)
listeners.wss.default {
  enable = false
}

## ── Dashboard ────────────────────────────────────────────────────────

dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "admin"
  default_password = "admin_tenuta"
}

## ── MQTT Protocol ────────────────────────────────────────────────────

mqtt {
  max_packet_size = 1MB
  max_topic_levels = 10
  max_qos_allowed = 2
  retain_available = true

  ## Session persistence per RNF-02 (resilienza disconnessioni < 24h)
  max_inflight = 32
  max_mqueue_len = 5000
  mqueue_default_priority = lowest
}

## ── Authorization (RNF-05) ──────────────────────────────────────────

authorization {
  no_match = deny
  deny_action = ignore
  cache {
    enable = true
    max_size = 1024
    ttl = 1m
  }
  sources = [
    {
      type = file
      enable = true
      path = "etc/acl.conf"
    }
  ]
}

## ── Authentication ──────────────────────────────────────────────────

authentication = [
  {
    mechanism = password_based
    backend = built_in_database
    enable = true
  }
]
